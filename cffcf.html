<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرائط الوضع الراهن</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #7dd3fc;
        }

        /* شبكة الصور المميزة الديناميكية */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-color);
        }

        .image-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #1e293b; /* لون احتياطي مريح أثناء تحميل الصورة */
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-card:hover img {
            transform: scale(1.1);
        }

        .image-info {
            padding: 1rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-info p {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* حركة تحميل ناعمة للبطاقات */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-card {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="welcome.html" class="back-btn">← العودة للوحة التحكم</a>
        <h1>معرض خرائط الوضع الراهن</h1>
        <p>استعراض ذكي للخرائط من مجلد </p>
    </div>

    <div class="gallery-grid">
        <div class="image-card" style="animation-delay: 0.1s;">
            <div class="image-container">
                <img src="mmm/1.jpeg" alt="الخريطة الأولى" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+1+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الأولى</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.2s;">
            <div class="image-container">
                <img src="mmm/2.jpeg" alt="الخريطة الثانية" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+2+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الثانية</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.3s;">
            <div class="image-container">
                <img src="mmm/3.jpeg" alt="الخريطة الثالثة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+3+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الثالثة</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.4s;">
            <div class="image-container">
                <img src="mmm/4.jpeg" alt="الخريطة الرابعة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+4+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الرابعة</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.5s;">
            <div class="image-container">
                <img src="mmm/5.jpeg" alt="الخريطة الخامسة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+5+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الخامسة</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.6s;">
            <div class="image-container">
                <img src="mmm/6.jpeg" alt="الخريطة السادسة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+6+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية السادسة</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.7s;">
            <div class="image-container">
                <img src="mmm/7.jpeg" alt="الخريطة السابعة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+7+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية السابعة</p></div>
        </div>

        <div class="image-card" style="animation-delay: 0.8s;">
            <div class="image-container">
                <img src="mmm/8.jpeg" alt="الخريطة الثامنة" onerror="this.src='https://via.placeholder.com/400x300/1e293b/38bdf8?text=Image+8+Missing'">
            </div>
            <div class="image-info"><p>الخريطة الجغرافية الثامنة</p></div>
        </div>
    </div>

</body>
</html>
