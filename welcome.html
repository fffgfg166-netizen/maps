<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - عالم الخرائط</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
            --accent-color: #38bdf8;
            --hover-bg: rgba(56, 189, 248, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            position: fixed;
            height: 100%;
            right: 0;
            justify-content: space-between;
        }

        .sidebar-top {
            width: 100%;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--accent-color);
            border-bottom: 1px solid var(--hover-bg);
            padding-bottom: 1rem;
        }

        .sidebar-nav { list-style: none; }

        .sidebar-nav li { margin-bottom: 0.5rem; }

        .sidebar-nav a {
            text-decoration: none;
            color: var(--text-main);
            padding: 0.8rem 1rem;
            display: block;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: var(--hover-bg);
            color: var(--accent-color);
            transform: translateX(-5px);
        }

        /* رابط المطور الديناميكي والمتحرك */
        .developer-container {
            text-align: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
        }

        .developer-link {
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent-color);
            display: inline-block;
            transition: color 0.3s ease;
            animation: bounceDynamic 3s infinite ease-in-out;
        }

        .developer-link:hover {
            color: #7dd3fc;
        }

        @keyframes bounceDynamic {
            0%, 100% {
                transform: translateY(0) scale(1);
                text-shadow: 0 0 0px transparent;
            }
            50% {
                transform: translateY(-6px) scale(1.03);
                text-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
            }
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            flex-grow: 1;
            padding: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
        }

        h1 { color: var(--accent-color); margin-bottom: 1rem; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 1rem 0.5rem; }
            .sidebar h2, .sidebar span, .developer-container { display: none; }
            .main-content { margin-right: 70px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-top">
            <h2>عالم الخرائط</h2>
            <ul class="sidebar-nav">
                <li><a href="cffcf.html">🗺️ <span>خرائط الوضع الراهن</span></a></li>
                <li><a href="hvdgvc.html">🔥 <span>الخرائط الحرارية</span></a></li>
                <li><a href="ffxdxd.html">🔵 <span>خرائط BUFFER</span></a></li>
                <!-- تم التعديل هنا ليقوم بالتحويل إلى صفحة cfxxxd.html -->
                <li><a href="cfxxxd.html">👥 <span>خرائط الكثافة السكانية</span></a></li>
            </ul>
        </div>

        <div class="developer-container">
            <a href="https://wa.me/201067579526" target="_blank" class="developer-link">👨‍💻 المطور: AHMED WAEL SAAD</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="welcome-card">
            <h1>مرحباً بك في النظام الجغرافي</h1>
            <p>يمكنك البدء بالتنقل عبر القائمة الجانبية لاستكشاف الخرائط والبيانات الجغرافية المتاحة.</p>
        </div>
    </main>

</body>
</html>
